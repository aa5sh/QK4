name: Lint & Test

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  clang-format:
    name: Check Code Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find src tests -name '*.cpp' -o -name '*.h' | xargs clang-format --dry-run --Werror

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6 and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev libopus-dev libhidapi-dev \
            libssl-dev libasound2-dev qt6-multimedia-dev qt6-serialport-dev \
            qt6-svg-dev qt6-shader-baker

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build tests
        run: cmake --build build --target test_radiostate test_radioutils

      - name: Run tests
        run: ctest --test-dir build --output-on-failure
